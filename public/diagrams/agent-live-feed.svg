<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 440" width="300" height="440">
  <style>
    @keyframes slideIn { 0%{opacity:0;transform:translateY(-8px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
    text { font-family: 'IBM Plex Mono', monospace; }
    .frame { fill:#12121e; stroke:#60a5fa; stroke-width:1.2; rx:8; }
    .title { fill:#e2e8f0; font-size:11px; font-weight:bold; letter-spacing:1px; }
    .label { fill:#e2e8f0; font-size:10px; }
    .label-sm { fill:#94a3b8; font-size:9px; }
    .label-dim { fill:#64748b; font-size:9px; }
    .divider { stroke:#1e1e30; stroke-width:.5; }
    .event { animation: slideIn 0.4s ease-out both; }
    .e1 { animation-delay: 0s; }
    .e2 { animation-delay: 0.3s; }
    .e3 { animation-delay: 0.6s; }
    .e4 { animation-delay: 0.9s; }
    .icon-tool { fill:#60a5fa; font-size:11px; }
    .icon-task { fill:#a78bfa; font-size:11px; }
    .icon-ok { fill:#34d399; font-size:11px; }
    .icon-spawn { fill:#f472b6; font-size:11px; }
  </style>

  <rect width="300" height="440" rx="10" fill="#0f0f1a"/>
  <rect class="frame" x="10" y="10" width="280" height="420"/>

  <text class="title" x="24" y="36">AGENT ACTIVITY</text>

  <!-- Event 1 -->
  <g class="event e1">
    <text class="icon-tool" x="24" y="70">⚡</text>
    <text class="label" style="fill:#a78bfa;font-weight:bold" x="42" y="70">CodeReviewer</text>
    <text class="label-sm" x="42" y="86">tool:read_file</text>
    <text class="label-sm" x="42" y="100">src/index.ts</text>
    <text class="label-dim" x="220" y="100">0.2s ago</text>
  </g>
  <line class="divider" x1="24" y1="112" x2="276" y2="112"/>

  <!-- Event 2 -->
  <g class="event e2">
    <text class="icon-task" x="24" y="136">▶</text>
    <text class="label" style="fill:#60a5fa;font-weight:bold" x="42" y="136">Researcher</text>
    <text class="label-sm" x="42" y="152">task:started</text>
    <text class="label-sm" x="42" y="166">"Analyze API docs"</text>
    <text class="label-dim" x="218" y="166">1.4s ago</text>
  </g>
  <line class="divider" x1="24" y1="178" x2="276" y2="178"/>

  <!-- Event 3 -->
  <g class="event e3">
    <text class="icon-ok" x="24" y="202">✓</text>
    <text class="label" style="fill:#34d399;font-weight:bold" x="42" y="202">CodeReviewer</text>
    <text class="label-sm" x="42" y="218">task:completed</text>
    <text class="label-sm" x="42" y="232">"Review PR #42"</text>
    <text class="label-dim" x="218" y="232">5.2s ago</text>
  </g>
  <line class="divider" x1="24" y1="244" x2="276" y2="244"/>

  <!-- Event 4 -->
  <g class="event e4">
    <text class="icon-spawn" x="24" y="268">⬡</text>
    <text class="label" style="fill:#f472b6;font-weight:bold" x="42" y="268">Planner</text>
    <text class="label-sm" x="42" y="284">agent:spawn</text>
    <text class="label-sm" x="42" y="298">role: planner</text>
    <text class="label-dim" x="218" y="298">8.1s ago</text>
  </g>
</svg>