<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <style>
    @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
    text { font-family: 'IBM Plex Mono', monospace; }
    .frame { fill:#181825; stroke:#a78bfa; stroke-width:1.2; rx:8; }
    .zone { fill:#12121e; stroke:#2a2a40; stroke-width:1; rx:4; }
    .label { fill:#e2e8f0; font-size:10px; }
    .title { fill:#e2e8f0; font-size:9px; font-weight:bold; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>

  <rect width="600" height="320" rx="12" fill="#0f0f1a"/>
  <rect class="frame" x="20" y="20" width="560" height="280"/>

  <text class="label" style="font-size:11px;font-weight:bold" x="228" y="15">AGENT PAGE LAYOUT</text>

  <!-- Timeline Bar -->
  <rect class="zone" style="stroke:#60a5fa" x="35" y="35" width="530" height="35"/>
  <text class="title" style="fill:#60a5fa" x="175" y="57">AgentTimelineBar (top) — task flow timeline</text>

  <!-- Middle -->
  <rect class="zone" style="stroke:#a78bfa" x="35" y="80" width="80" height="170"/>
  <text class="title" style="fill:#a78bfa" x="39" y="120">Agent</text>
  <text class="title" style="fill:#a78bfa" x="39" y="135">Side</text>
  <text class="title" style="fill:#a78bfa" x="39" y="150">bar</text>

  <rect class="zone" style="stroke:#f472b6" x="125" y="80" width="440" height="170"/>
  <text class="title" style="fill:#f472b6" x="255" y="160">AgentForceGraph Canvas</text>
  <circle class="pulse" fill="#f472b6" cx="248" cy="170" r="3"/>

  <!-- Bottom -->
  <rect class="zone" style="stroke:#fbbf24" x="35" y="260" width="370" height="30"/>
  <text class="title" style="fill:#fbbf24" x="115" y="280">AgentStatsBar (bottom-left)</text>

  <rect class="zone" style="stroke:#34d399" x="415" y="260" width="150" height="30"/>
  <text class="title" style="fill:#34d399" x="435" y="280">AgentFeed</text>
</svg>