<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Benchmark: swarming (Three.js + d3-force-3d)</title>
  <style>html,body{margin:0;overflow:hidden;width:100%;height:100%;background:#000}</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://unpkg.com/three@0.169.0/build/three.min.js"></script>
<script src="https://unpkg.com/d3-force-3d@3.0.6/dist/d3-force-3d.min.js"></script>
<script src="harness.js"></script>
<script src="gen-graph.js"></script>
<script>
(function() {
  const N = parseInt(new URLSearchParams(location.search).get('nodes') || '1000');
  const { nodes, edges } = generateGraph(N);

  // Three.js setup
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(1);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
  camera.position.set(0, 0, 300);

  // Instanced spheres for nodes
  const geo = new THREE.SphereGeometry(1.5, 8, 6);
  const mat = new THREE.MeshBasicMaterial({ color: 0x4fc3f7 });
  const mesh = new THREE.InstancedMesh(geo, mat, N);
  scene.add(mesh);

  // Edges as LineSegments
  const edgePositions = new Float32Array(edges.length * 6);
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(edgePositions, 3));
  const lineMat = new THREE.LineBasicMaterial({ color: 0x444444, transparent: true, opacity: 0.3 });
  const lines = new THREE.LineSegments(lineGeo, lineMat);
  scene.add(lines);

  // d3-force-3d simulation
  const simNodes = nodes.map((n, i) => ({ ...n, index: i }));
  const simEdges = edges.map(e => ({ source: e.source, target: e.target }));

  const sim = d3.forceSimulation(simNodes, 3)
    .force('charge', d3.forceManyBody().strength(-30))
    .force('link', d3.forceLink(simEdges).id(d => d.id).distance(20))
    .force('center', d3.forceCenter())
    .alphaDecay(0.01)
    .velocityDecay(0.4);

  const dummy = new THREE.Object3D();
  let firstFrame = true;

  function animate() {
    requestAnimationFrame(animate);

    const t0 = performance.now();
    sim.tick();
    const physMs = performance.now() - t0;
    BenchHarness.reportPhysicsTick(physMs);

    const t1 = performance.now();
    for (let i = 0; i < simNodes.length; i++) {
      dummy.position.set(simNodes[i].x, simNodes[i].y, simNodes[i].z || 0);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
    }
    mesh.instanceMatrix.needsUpdate = true;

    for (let i = 0; i < simEdges.length; i++) {
      const s = simEdges[i].source;
      const t = simEdges[i].target;
      edgePositions[i * 6]     = s.x;
      edgePositions[i * 6 + 1] = s.y;
      edgePositions[i * 6 + 2] = s.z || 0;
      edgePositions[i * 6 + 3] = t.x;
      edgePositions[i * 6 + 4] = t.y;
      edgePositions[i * 6 + 5] = t.z || 0;
    }
    lineGeo.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
    const renderMs = performance.now() - t1;
    BenchHarness.reportRenderFrame(renderMs);

    if (firstFrame) {
      BenchHarness.markFirstFrame();
      BenchHarness.markInteractive();
      firstFrame = false;
    }
  }
  animate();
})();
</script>
</body>
</html>
