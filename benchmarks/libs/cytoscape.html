<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Benchmark: Cytoscape.js</title>
  <style>html,body{margin:0;overflow:hidden;width:100%;height:100%;background:#111}#cy{width:100%;height:100%}</style>
</head>
<body>
<div id="cy"></div>
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="harness.js"></script>
<script src="gen-graph.js"></script>
<script>
(function() {
  const N = parseInt(new URLSearchParams(location.search).get('nodes') || '1000');
  const { nodes, edges } = generateGraph(N);

  const elements = [];
  nodes.forEach(n => {
    elements.push({
      data: { id: n.id },
      position: { x: n.x, y: n.y },
    });
  });
  edges.forEach((e, i) => {
    elements.push({
      data: { id: 'e' + i, source: e.source, target: e.target },
    });
  });

  const cy = cytoscape({
    container: document.getElementById('cy'),
    elements: elements,
    style: [
      { selector: 'node', style: { 'background-color': '#4fc3f7', width: 6, height: 6 } },
      { selector: 'edge', style: { 'line-color': '#444', opacity: 0.3, width: 0.5 } },
    ],
    layout: { name: 'preset' },
    hideEdgesOnViewport: true,
    textureOnViewport: true,
  });

  BenchHarness.markFirstFrame();

  const t0 = performance.now();
  const layout = cy.layout({
    name: 'cose',
    animate: true,
    animationDuration: 0,
    nodeRepulsion: 8000,
    idealEdgeLength: 50,
    gravity: 0.25,
    numIter: 500,
    fit: true,
  });

  layout.on('layoutstop', () => {
    BenchHarness.markInteractive();
    BenchHarness.reportPhysicsTick(performance.now() - t0);
  });

  layout.run();

  // FPS tracking via render events
  let lastRender = performance.now();
  function trackFps() {
    requestAnimationFrame(() => {
      const now = performance.now();
      BenchHarness.reportRenderFrame(now - lastRender);
      lastRender = now;
      trackFps();
    });
  }
  trackFps();
})();
</script>
</body>
</html>
