<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Benchmark: ngraph (Canvas 2D fallback)</title>
  <style>html,body{margin:0;overflow:hidden;width:100%;height:100%;background:#111}</style>
</head>
<body>
<canvas id="c"></canvas>
<!--
  ngraph doesn't have a single UMD bundle for WebGL rendering.
  We use ngraph.graph + ngraph.forcelayout via CDN and Canvas 2D rendering,
  which is the most common ngraph usage pattern.
-->
<script src="https://unpkg.com/ngraph.graph@20.0.1/dist/ngraph.graph.min.js"></script>
<script src="https://unpkg.com/ngraph.forcelayout@3.3.1/dist/ngraph.forcelayout.min.js"></script>
<script src="harness.js"></script>
<script src="gen-graph.js"></script>
<script>
(function() {
  const N = parseInt(new URLSearchParams(location.search).get('nodes') || '1000');
  const { nodes, edges } = generateGraph(N);

  const canvas = document.getElementById('c');
  const width = canvas.width = window.innerWidth;
  const height = canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  // Build ngraph
  const graph = createGraph();
  nodes.forEach(n => graph.addNode(n.id));
  edges.forEach(e => graph.addLink(e.source, e.target));

  const layout = createLayout(graph, {
    springLength: 30,
    springCoefficient: 0.0008,
    gravity: -1.2,
    theta: 0.8,
    dragCoefficient: 0.02,
  });

  let firstFrame = true;

  function animate() {
    requestAnimationFrame(animate);

    const t0 = performance.now();
    layout.step();
    BenchHarness.reportPhysicsTick(performance.now() - t0);

    const t1 = performance.now();
    ctx.clearRect(0, 0, width, height);

    // Compute bounds for centering
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    graph.forEachNode(node => {
      const pos = layout.getNodePosition(node.id);
      if (pos.x < minX) minX = pos.x;
      if (pos.x > maxX) maxX = pos.x;
      if (pos.y < minY) minY = pos.y;
      if (pos.y > maxY) maxY = pos.y;
    });

    const rangeX = maxX - minX || 1;
    const rangeY = maxY - minY || 1;
    const scale = Math.min(width / rangeX, height / rangeY) * 0.8;
    const offsetX = width / 2;
    const offsetY = height / 2;
    const centerX = (minX + maxX) / 2;
    const centerY = (minY + maxY) / 2;

    function tx(x) { return (x - centerX) * scale + offsetX; }
    function ty(y) { return (y - centerY) * scale + offsetY; }

    // Draw edges
    ctx.strokeStyle = 'rgba(68,68,68,0.3)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    graph.forEachLink(link => {
      const from = layout.getNodePosition(link.fromId);
      const to = layout.getNodePosition(link.toId);
      ctx.moveTo(tx(from.x), ty(from.y));
      ctx.lineTo(tx(to.x), ty(to.y));
    });
    ctx.stroke();

    // Draw nodes
    ctx.fillStyle = '#4fc3f7';
    graph.forEachNode(node => {
      const pos = layout.getNodePosition(node.id);
      ctx.beginPath();
      ctx.arc(tx(pos.x), ty(pos.y), 3, 0, Math.PI * 2);
      ctx.fill();
    });

    BenchHarness.reportRenderFrame(performance.now() - t1);

    if (firstFrame) {
      BenchHarness.markFirstFrame();
      BenchHarness.markInteractive();
      firstFrame = false;
    }
  }
  animate();
})();
</script>
</body>
</html>
