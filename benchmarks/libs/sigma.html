<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Benchmark: Sigma.js</title>
  <style>html,body{margin:0;overflow:hidden;width:100%;height:100%;background:#111}#container{width:100%;height:100%}</style>
</head>
<body>
<div id="container"></div>
<script src="https://unpkg.com/graphology@0.25.4/dist/graphology.umd.min.js"></script>
<script src="https://unpkg.com/graphology-layout-forceatlas2@0.10.1/dist/graphology-layout-forceatlas2.min.js"></script>
<script src="https://unpkg.com/sigma@2.4.0/build/sigma.min.js"></script>
<script src="harness.js"></script>
<script src="gen-graph.js"></script>
<script>
(function() {
  const N = parseInt(new URLSearchParams(location.search).get('nodes') || '1000');
  const { nodes, edges } = generateGraph(N);

  const graph = new graphology.Graph();
  nodes.forEach(n => {
    graph.addNode(n.id, {
      x: n.x / 10,
      y: n.y / 10,
      size: 3,
      color: '#4fc3f7',
    });
  });
  edges.forEach((e, i) => {
    try { graph.addEdge(e.source, e.target, { color: '#444444' }); } catch {}
  });

  const container = document.getElementById('container');
  const renderer = new Sigma(graph, container, {
    renderEdgeLabels: false,
    enableEdgeEvents: false,
  });

  BenchHarness.markFirstFrame();
  BenchHarness.markInteractive();

  // Run ForceAtlas2 layout
  const fa2Layout = graphologyLibrary.layoutForceAtlas2;
  let running = true;
  function tick() {
    if (!running) return;
    const t0 = performance.now();
    fa2Layout.assign(graph, { iterations: 1, settings: { gravity: 1, scalingRatio: 10 } });
    BenchHarness.reportPhysicsTick(performance.now() - t0);

    const t1 = performance.now();
    renderer.refresh();
    BenchHarness.reportRenderFrame(performance.now() - t1);

    requestAnimationFrame(tick);
  }
  tick();

  // Stop after 30s to prevent infinite run
  setTimeout(() => { running = false; }, 30000);
})();
</script>
</body>
</html>
