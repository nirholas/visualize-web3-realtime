<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Benchmark: vis-network</title>
  <style>html,body{margin:0;overflow:hidden;width:100%;height:100%;background:#111}#container{width:100%;height:100%}</style>
</head>
<body>
<div id="container"></div>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script src="harness.js"></script>
<script src="gen-graph.js"></script>
<script>
(function() {
  const N = parseInt(new URLSearchParams(location.search).get('nodes') || '1000');
  const { nodes: rawNodes, edges: rawEdges } = generateGraph(N);

  const visNodes = rawNodes.map(n => ({
    id: n.id,
    x: n.x,
    y: n.y,
    color: '#4fc3f7',
    size: 6,
  }));
  const visEdges = rawEdges.map((e, i) => ({
    id: 'e' + i,
    from: e.source,
    to: e.target,
    color: { color: '#444444', opacity: 0.3 },
  }));

  const container = document.getElementById('container');
  const data = {
    nodes: new vis.DataSet(visNodes),
    edges: new vis.DataSet(visEdges),
  };
  const options = {
    physics: {
      solver: 'forceAtlas2Based',
      forceAtlas2Based: {
        gravitationalConstant: -50,
        springLength: 50,
        springConstant: 0.08,
      },
      stabilization: { enabled: false },
    },
    nodes: {
      shape: 'dot',
      size: 6,
      borderWidth: 0,
    },
    edges: {
      width: 0.5,
      smooth: false,
    },
    interaction: {
      hideEdgesOnDrag: true,
      hideEdgesOnZoom: true,
    },
  };

  BenchHarness.markFirstFrame();

  const network = new vis.Network(container, data, options);
  network.on('stabilized', () => {
    BenchHarness.markInteractive();
  });

  // Track render timing
  let lastFrame = performance.now();
  function track() {
    requestAnimationFrame((now) => {
      BenchHarness.reportRenderFrame(now - lastFrame);
      lastFrame = now;
      track();
    });
  }
  track();
})();
</script>
</body>
</html>
