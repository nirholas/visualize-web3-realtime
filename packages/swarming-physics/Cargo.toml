[package]
name = "swarming-physics"
version = "0.1.0"
edition = "2021"
description = "WASM-based Barnes-Hut force simulation for swarming graph visualization"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
