<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="src" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="prov" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="eng" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="ren" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="36" fill="#94a3b8" font-family="monospace" font-size="13" text-anchor="middle" letter-spacing="0.15em">DATA PIPELINE ARCHITECTURE</text>

  <!-- Connector arrows -->
  <line x1="195" y1="160" x2="265" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="445" y1="160" x2="515" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="695" y1="160" x2="765" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Data flow labels on arrows -->
  <text x="230" y="148" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">events</text>
  <text x="480" y="148" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">nodes</text>
  <text x="730" y="148" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">scene</text>

  <!-- Stage 1: Data Source -->
  <g transform="translate(30, 95)">
    <rect width="160" height="130" rx="10" fill="url(#src)" opacity="0.15" stroke="url(#src)" stroke-width="1"/>
    <rect width="160" height="4" rx="2" fill="url(#src)" opacity="0.6"/>
    <text x="80" y="30" fill="#c7d2fe" font-family="monospace" font-size="12" font-weight="600" text-anchor="middle">Data Source</text>
    <text x="80" y="52" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">WebSocket</text>
    <text x="80" y="68" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">REST API</text>
    <text x="80" y="84" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">RPC / Stream</text>
    <line x1="20" y1="98" x2="140" y2="98" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
    <text x="80" y="116" fill="#818cf8" font-family="monospace" font-size="9" text-anchor="middle">packages/providers</text>
  </g>

  <!-- Stage 2: Provider -->
  <g transform="translate(280, 95)">
    <rect width="160" height="130" rx="10" fill="url(#prov)" opacity="0.15" stroke="url(#prov)" stroke-width="1"/>
    <rect width="160" height="4" rx="2" fill="url(#prov)" opacity="0.6"/>
    <text x="80" y="30" fill="#bfdbfe" font-family="monospace" font-size="12" font-weight="600" text-anchor="middle">Provider</text>
    <text x="80" y="52" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">Normalize</text>
    <text x="80" y="68" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">Validate</text>
    <text x="80" y="84" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">BoundedMap LRU</text>
    <line x1="20" y1="98" x2="140" y2="98" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
    <text x="80" y="116" fill="#60a5fa" font-family="monospace" font-size="9" text-anchor="middle">packages/core</text>
  </g>

  <!-- Stage 3: Engine -->
  <g transform="translate(530, 95)">
    <rect width="160" height="130" rx="10" fill="url(#eng)" opacity="0.15" stroke="url(#eng)" stroke-width="1"/>
    <rect width="160" height="4" rx="2" fill="url(#eng)" opacity="0.6"/>
    <text x="80" y="30" fill="#a5f3fc" font-family="monospace" font-size="12" font-weight="600" text-anchor="middle">Engine</text>
    <text x="80" y="52" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">d3-force-3d</text>
    <text x="80" y="68" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">Simulation</text>
    <text x="80" y="84" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">Mouse Repulsion</text>
    <line x1="20" y1="98" x2="140" y2="98" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
    <text x="80" y="116" fill="#22d3ee" font-family="monospace" font-size="9" text-anchor="middle">features/World</text>
  </g>

  <!-- Stage 4: Renderer -->
  <g transform="translate(780, 95)">
    <rect width="90" height="130" rx="10" fill="url(#ren)" opacity="0.15" stroke="url(#ren)" stroke-width="1"/>
    <rect width="90" height="4" rx="2" fill="url(#ren)" opacity="0.6"/>
    <text x="45" y="30" fill="#a7f3d0" font-family="monospace" font-size="12" font-weight="600" text-anchor="middle">Renderer</text>
    <text x="45" y="52" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">Three.js</text>
    <text x="45" y="68" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">R3F</text>
    <text x="45" y="84" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">Bloom</text>
    <line x1="10" y1="98" x2="80" y2="98" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>
    <text x="45" y="116" fill="#34d399" font-family="monospace" font-size="9" text-anchor="middle">WebGL</text>
  </g>

  <!-- Bottom stats -->
  <text x="450" y="290" fill="#475569" font-family="monospace" font-size="10" text-anchor="middle">5,000 nodes · 60fps · &lt;16ms frame budget · GPU-accelerated</text>
</svg>
