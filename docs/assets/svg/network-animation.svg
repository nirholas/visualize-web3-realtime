<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#0a0a0f"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.04" stroke="#ffffff">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Animated edges (data flowing between nodes) -->
  <!-- Edge: Node1 -> Node2 -->
  <line x1="130" y1="80" x2="300" y2="120" stroke="url(#edgeGrad)" stroke-width="1" opacity="0.3"/>
  <circle r="2" fill="#6366f1" opacity="0.8">
    <animateMotion dur="3s" repeatCount="indefinite" path="M130,80 L300,120"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Edge: Node2 -> Node3 -->
  <line x1="300" y1="120" x2="500" y2="70" stroke="url(#edgeGrad)" stroke-width="1" opacity="0.3"/>
  <circle r="2" fill="#22c55e" opacity="0.8">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M300,120 L500,70"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Edge: Node3 -> Node4 -->
  <line x1="500" y1="70" x2="670" y2="130" stroke="url(#edgeGrad)" stroke-width="1" opacity="0.3"/>
  <circle r="2" fill="#f59e0b" opacity="0.8">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M500,70 L670,130"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Edge: Node1 -> Node3 -->
  <line x1="130" y1="80" x2="500" y2="70" stroke="url(#edgeGrad)" stroke-width="0.5" opacity="0.2"/>
  <circle r="1.5" fill="#a855f7" opacity="0.6">
    <animateMotion dur="4s" repeatCount="indefinite" path="M130,80 L500,70"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Edge: Node2 -> Node4 -->
  <line x1="300" y1="120" x2="670" y2="130" stroke="url(#edgeGrad)" stroke-width="0.5" opacity="0.2"/>
  <circle r="1.5" fill="#ec4899" opacity="0.6">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M300,120 L670,130"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Cross edges -->
  <line x1="130" y1="80" x2="670" y2="130" stroke="#6366f1" stroke-width="0.3" opacity="0.1"/>
  <line x1="300" y1="120" x2="500" y2="70" stroke="#22c55e" stroke-width="0.3" opacity="0.1"/>

  <!-- Hub nodes with pulse animation -->
  <!-- Node 1: Solana/PumpFun -->
  <circle cx="130" cy="80" r="18" fill="#6366f1" opacity="0.15" filter="url(#softGlow)">
    <animate attributeName="r" values="18;24;18" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="80" r="10" fill="url(#nodeGrad1)" filter="url(#nodeGlow)">
    <animate attributeName="r" values="10;12;10" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="130" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">Solana</text>

  <!-- Node 2: Ethereum -->
  <circle cx="300" cy="120" r="22" fill="#22c55e" opacity="0.15" filter="url(#softGlow)">
    <animate attributeName="r" values="22;28;22" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="120" r="13" fill="url(#nodeGrad2)" filter="url(#nodeGlow)">
    <animate attributeName="r" values="13;15;13" dur="4s" repeatCount="indefinite"/>
  </circle>
  <text x="300" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">Ethereum</text>

  <!-- Node 3: AI Agents -->
  <circle cx="500" cy="70" r="20" fill="#f59e0b" opacity="0.15" filter="url(#softGlow)">
    <animate attributeName="r" values="20;26;20" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="70" r="12" fill="url(#nodeGrad3)" filter="url(#nodeGlow)">
    <animate attributeName="r" values="12;14;12" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <text x="500" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">AI Agents</text>

  <!-- Node 4: Base -->
  <circle cx="670" cy="130" r="16" fill="#ec4899" opacity="0.15" filter="url(#softGlow)">
    <animate attributeName="r" values="16;22;16" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="670" cy="130" r="9" fill="#ec4899" filter="url(#nodeGlow)">
    <animate attributeName="r" values="9;11;9" dur="5s" repeatCount="indefinite"/>
  </circle>
  <text x="670" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">Base</text>

  <!-- Small satellite nodes -->
  <circle cx="80" cy="45" r="3" fill="#6366f1" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="55" r="2" fill="#8b5cf6" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="160" r="2.5" fill="#22c55e" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.1;0.35" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="370" cy="90" r="2" fill="#06b6d4" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="440" cy="150" r="3" fill="#f59e0b" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="570" cy="45" r="2" fill="#ec4899" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="730" cy="70" r="2.5" fill="#a855f7" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.1;0.35" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="170" r="2" fill="#06b6d4" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3.3s" repeatCount="indefinite"/>
  </circle>

  <!-- Thin satellite edges -->
  <line x1="80" y1="45" x2="130" y2="80" stroke="#6366f1" stroke-width="0.3" opacity="0.15"/>
  <line x1="180" y1="55" x2="130" y2="80" stroke="#8b5cf6" stroke-width="0.3" opacity="0.12"/>
  <line x1="250" y1="160" x2="300" y2="120" stroke="#22c55e" stroke-width="0.3" opacity="0.15"/>
  <line x1="370" y1="90" x2="300" y2="120" stroke="#06b6d4" stroke-width="0.3" opacity="0.12"/>
  <line x1="440" y1="150" x2="500" y2="70" stroke="#f59e0b" stroke-width="0.3" opacity="0.15"/>
  <line x1="570" y1="45" x2="500" y2="70" stroke="#ec4899" stroke-width="0.3" opacity="0.12"/>
  <line x1="730" y1="70" x2="670" y2="130" stroke="#a855f7" stroke-width="0.3" opacity="0.15"/>
  <line x1="750" y1="170" x2="670" y2="130" stroke="#06b6d4" stroke-width="0.3" opacity="0.12"/>
</svg>
