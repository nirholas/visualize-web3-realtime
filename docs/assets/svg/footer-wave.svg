<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" fill="none">
  <defs>
    <linearGradient id="footGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1">
        <animate attributeName="stop-color" values="#6366f1;#a855f7;#6366f1" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#22c55e;#a855f7" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#22c55e">
        <animate attributeName="stop-color" values="#22c55e;#6366f1;#22c55e" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="800" height="100" fill="#0a0a0f"/>

  <!-- Wave 1 -->
  <path opacity="0.15" fill="url(#footGrad)">
    <animate attributeName="d" 
      values="M0,60 C100,40 200,80 300,50 C400,20 500,70 600,45 C700,20 800,55 800,55 L800,100 L0,100 Z;
              M0,50 C100,70 200,30 300,60 C400,80 500,35 600,55 C700,75 800,40 800,40 L800,100 L0,100 Z;
              M0,60 C100,40 200,80 300,50 C400,20 500,70 600,45 C700,20 800,55 800,55 L800,100 L0,100 Z"
      dur="8s" repeatCount="indefinite"/>
  </path>

  <!-- Wave 2 -->
  <path opacity="0.1" fill="url(#footGrad)">
    <animate attributeName="d"
      values="M0,70 C120,50 240,90 360,60 C480,30 600,75 720,50 L800,65 L800,100 L0,100 Z;
              M0,55 C120,80 240,40 360,70 C480,90 600,45 720,65 L800,50 L800,100 L0,100 Z;
              M0,70 C120,50 240,90 360,60 C480,30 600,75 720,50 L800,65 L800,100 L0,100 Z"
      dur="6s" repeatCount="indefinite"/>
  </path>

  <!-- Gradient line at top -->
  <line x1="100" y1="20" x2="700" y2="20" stroke="url(#footGrad)" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

  <!-- Text -->
  <text x="400" y="47" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b" letter-spacing="2">
    SEE YOUR DATA SWARM
  </text>

  <!-- Small animated dots -->
  <circle cx="200" cy="20" r="2" fill="#6366f1" opacity="0.6">
    <animate attributeName="cx" values="200;600;200" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="20" r="2" fill="#22c55e" opacity="0.6">
    <animate attributeName="cx" values="600;200;600" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="10s" repeatCount="indefinite"/>
  </circle>
</svg>
