name: Bug Report
description: Report a bug in swarming.world
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: A clear description of the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      description: Which version are you using?
      placeholder: e.g. 0.1.0
    validations:
      required: false

  - type: dropdown
    id: framework
    attributes:
      label: Framework
      description: Which framework are you using?
      options:
        - Next.js
        - Vite
        - Remix
        - Vanilla
        - Other
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser(s) are affected?
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot / Recording
      description: If applicable, add screenshots or a screen recording.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any additional environment details (OS, GPU, Node version, etc.)
      placeholder: |
        - OS: macOS 14.0
        - GPU: Apple M2
        - Node: 20.10.0
    validations:
      required: false
