name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx turbo run typecheck

      - name: Build
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build and measure bundle
        run: npm run build

      - name: Report bundle size
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read Next.js build output for size info
            const buildDir = '.next';
            let totalSize = 0;
            const sizes = [];

            function getDirectorySize(dir) {
              if (!fs.existsSync(dir)) return 0;
              let size = 0;
              const files = fs.readdirSync(dir, { withFileTypes: true });
              for (const file of files) {
                const filePath = path.join(dir, file.name);
                if (file.isDirectory()) {
                  size += getDirectorySize(filePath);
                } else {
                  size += fs.statSync(filePath).size;
                }
              }
              return size;
            }

            // Measure static pages and chunks
            const staticDir = path.join(buildDir, 'static');
            if (fs.existsSync(staticDir)) {
              const staticSize = getDirectorySize(staticDir);
              totalSize += staticSize;
              sizes.push(`Static assets: ${(staticSize / 1024).toFixed(1)} KB`);
            }

            const body = [
              '## Bundle Size Report',
              '',
              ...sizes,
              `**Total static size:** ${(totalSize / 1024).toFixed(1)} KB`,
              '',
              '_Measured from `.next/static/` directory._'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
